# Colors (Blood Moon)

# Default colors
[colors.primary]
background = '#10100E'
foreground = '#C6C6C4'

# Normal colors
[colors.normal]
black   = '#10100E'
red     = '#C40233'
green   = '#009F6B'
yellow  = '#FFD700'
blue    = '#0087BD'
magenta = '#9A4EAE'
cyan    = '#20B2AA'
white   = '#C6C6C4'

# Bright colors
[colors.bright]
black   = '#696969'
red     = '#FF2400'
green   = '#03C03C'
yellow  = '#FDFF00'
blue    = '#007FFF'
magenta = '#FF1493'
cyan    = '#00CCCC'
white   = '#FFFAFA'

[cursor]
blink_interval = 500
unfocused_hollow = false

[cursor.style]
blinking = "Always"

[env]
TERM = "xterm-256color"

[font]
size = 14

[font.normal]
family = "IBM Plex Mono"

[mouse]
hide_when_typing = true

[window]
dynamic_title = true
