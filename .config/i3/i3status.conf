#   
#    ####             ####
#   ######           ######         i3wm 
#    ####             ####          config file
#
#   ########################        gryzlee
#    ######################
#     ###################           Note: Some glyphs use Font Awesome 
#       ################       
#

general {
        colors = true
        interval = 1
}

order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "disk /"
order += "disk /home"
order += "load"
order += "memory"
order += "tztime local"

wireless _first_ {
        format_up = "  %essid %quality  %bitrate "
	format_down = ""
}

ethernet _first_ {
        format_up = "   %speed "
	format_down = ""
}

battery all {
        format = "  %status  %percentage  %remaining "
	format_down = ""
	status_chr = ""
	status_bat = ""
	status_unk = "?"
	status_full = ""
	low_threshold = 10
}

disk "/" {
        format = "  / %avail / %total "
}

disk "/home" {
        format = " /home %avail / %total "
}


load {
        format = "   %1min "
}

memory {
        format = "   %used / %total "
        threshold_degraded = "1G"
}

tztime local {
        format = "   %d/%m/%Y   %H:%M:%S  "
}
